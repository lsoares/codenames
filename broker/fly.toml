# Fly.io config for the PeerJS broker. Deploy from this folder:
#   cd broker && fly launch --copy-config --now   (first time; pick a unique app name)
#   fly deploy                                     (subsequent deploys)
# Then point the client at it (see broker/README.md).
app = "codenames-broker"
primary_region = "mad"

[build]

[http_service]
  internal_port = 9000
  force_https = true
  # Keep one machine always on so joins never hit a cold start.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "9000"
  PEER_KEY = "peerjs"
