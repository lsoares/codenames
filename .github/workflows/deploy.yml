name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment, cancelling older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Optional: add this repo secret for real photos; otherwise the app
          # falls back to placeholder tiles.
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_THECATAPI_KEY: ${{ secrets.VITE_THECATAPI_KEY }}
          VITE_RAWG_API_KEY: ${{ secrets.VITE_RAWG_API_KEY }}
          # Signaling uses the self-hosted Fly broker (same as dev), so localhost
          # and the deployed site share one broker and can join each other's rooms.
          # (History note: an earlier build used the public broker because the
          # self-hosted one was blocking colleagues — retest cross-network joins.)
          VITE_PEER_HOST: codenames-broker-lsoares.fly.dev
          VITE_PEER_PORT: '443'
          VITE_PEER_PATH: /
          VITE_PEER_KEY: peerjs
          VITE_PEER_SECURE: 'true'
          # TURN relay for cross-network NAT traversal. The built-in free OpenRelay
          # relay is unreliable, so set these repo Secrets to your own (e.g. a free
          # Metered account). Unset ⇒ the OpenRelay fallback in src/multiplayer/peer.ts.
          VITE_TURN_URL: ${{ secrets.TURN_URL }}
          VITE_TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.TURN_CREDENTIAL }}
          VITE_METERED_TURN_URL: ${{ secrets.METERED_TURN_URL }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=codenamesany --branch=main
