name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Optional: add this repo secret for real photos; otherwise the app
          # falls back to placeholder tiles.
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          # Optional: set these repo Variables to point the deployed site at a
          # self-hosted PeerJS broker (see broker/README.md). Unset ⇒ public broker.
          VITE_PEER_HOST: ${{ vars.PEER_HOST }}
          VITE_PEER_PORT: ${{ vars.PEER_PORT }}
          VITE_PEER_PATH: ${{ vars.PEER_PATH }}
          VITE_PEER_KEY: ${{ vars.PEER_KEY }}
          VITE_PEER_SECURE: ${{ vars.PEER_SECURE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
