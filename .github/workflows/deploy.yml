name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Optional: add this repo secret for real photos; otherwise the app
          # falls back to placeholder tiles.
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY }}
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY }}
          VITE_THECATAPI_KEY: ${{ secrets.VITE_THECATAPI_KEY }}
          VITE_RAWG_API_KEY: ${{ secrets.VITE_RAWG_API_KEY }}
          # Signaling uses the public PeerJS broker. We deliberately do NOT pass
          # VITE_PEER_* here, so the build ignores any self-hosted broker Variable
          # and newPeer() falls back to the public broker (see src/multiplayer/peer.ts).
          # TURN relay for cross-network NAT traversal. The built-in free OpenRelay
          # relay is unreliable, so set these repo Secrets to your own (e.g. a free
          # Metered account). Unset ⇒ the OpenRelay fallback in src/multiplayer/peer.ts.
          VITE_TURN_URL: ${{ secrets.TURN_URL }}
          VITE_TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.TURN_CREDENTIAL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
